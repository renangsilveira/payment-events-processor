name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build -x test

      - name: Run tests
        run: ./gradlew test

      - name: Run integration tests
        run: ./gradlew integrationTest
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"

      - name: Generate merged JaCoCo report
        run: ./gradlew jacocoMergedReport

      - name: Check coverage gate (80%)
        run: ./gradlew jacocoMergedCoverageVerification

      - name: Upload merged coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-merged-report
          path: build/reports/jacoco/jacocoMergedReport/